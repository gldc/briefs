name: Auto-merge Athena briefs

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-merge:
    if: |
      !github.event.pull_request.draft &&
      (
        startsWith(github.event.pull_request.head.ref, 'agent/deep-research/') ||
        startsWith(github.event.pull_request.head.ref, 'agent/athena/') ||
        startsWith(github.event.pull_request.head.ref, 'brief-')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Inspect changed files
        id: scope
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          mapfile -t files < <(gh pr diff "$PR" --name-only -R "$GITHUB_REPOSITORY")
          echo "Changed files:"
          printf '  %s\n' "${files[@]}"

          if [ "${#files[@]}" -eq 0 ]; then
            echo "reason=empty" >> "$GITHUB_OUTPUT"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Each file must match briefs/YYYY/MM/DD.md exactly.
          path_re='^briefs/[0-9]{4}/[0-9]{2}/[0-9]{2}\.md$'
          for f in "${files[@]}"; do
            if [[ ! "$f" =~ $path_re ]]; then
              echo "Out-of-scope file: $f"
              echo "reason=out_of_scope" >> "$GITHUB_OUTPUT"
              echo "ok=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          # Reject if any file already exists on main (duplicate brief).
          for f in "${files[@]}"; do
            if gh api "repos/$GITHUB_REPOSITORY/contents/$f?ref=main" --silent >/dev/null 2>&1; then
              echo "Duplicate: $f already exists on main"
              echo "reason=duplicate" >> "$GITHUB_OUTPUT"
              echo "dupe_path=$f" >> "$GITHUB_OUTPUT"
              echo "ok=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "All files match briefs/YYYY/MM/DD.md and are net-new — safe to auto-merge."
          echo "reason=ok" >> "$GITHUB_OUTPUT"
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Squash-merge PR
        if: steps.scope.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --delete-branch \
            --subject "$(gh pr view "$PR" -R "$GITHUB_REPOSITORY" --json title --jq .title)"

      - name: Dispatch site deploy
        if: steps.scope.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # GITHUB_TOKEN-driven pushes don't trigger workflows, so kick the
          # deploy workflow explicitly via workflow_dispatch.
          gh workflow run "Deploy briefs site" \
            --ref main \
            --repo "$GITHUB_REPOSITORY"

      - name: Close PR with reason
        if: steps.scope.outputs.ok != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REASON: ${{ steps.scope.outputs.reason }}
          DUPE_PATH: ${{ steps.scope.outputs.dupe_path }}
        run: |
          set -euo pipefail
          case "$REASON" in
            empty)
              body=$'🤖 Auto-merge skipped — empty diff. Closing.'
              ;;
            out_of_scope)
              body=$'🤖 Auto-merge skipped — this PR touches files outside `briefs/YYYY/MM/DD.md`. Athena should commit briefs at `briefs/YYYY/MM/DD.md`. Closing so a fresh PR can be opened at the right path.'
              ;;
            duplicate)
              body=$'🤖 Auto-merge skipped — `'"$DUPE_PATH"$'` already exists on `main`. Closing to avoid clobbering today\'s brief.'
              ;;
            *)
              body=$'🤖 Auto-merge skipped. Closing.'
              ;;
          esac

          gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" --body "$body"
          gh pr close "$PR" --repo "$GITHUB_REPOSITORY" --delete-branch
